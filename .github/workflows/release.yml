name: Release

on:
  push:
    tags:
      - 'v*'          # 推 v1.0.0 這樣的 tag 才觸發

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: 建立 Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # 自動從 commit 產生說明
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}